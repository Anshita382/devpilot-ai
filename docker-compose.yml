services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: devpilot
      POSTGRES_PASSWORD: devpilot
      POSTGRES_DB: devpilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devpilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DEVPILOT_MODE: ${DEVPILOT_MODE:-mock}
      DEVPILOT_DATABASE_URL: postgresql+psycopg://devpilot:devpilot@postgres:5432/devpilot
      DEVPILOT_REDIS_URL: redis://redis:6379/0
      # Pass through provider keys if running in api mode (optional).
      DEVPILOT_OPENAI_API_KEY: ${DEVPILOT_OPENAI_API_KEY:-}
      DEVPILOT_ANTHROPIC_API_KEY: ${DEVPILOT_ANTHROPIC_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./examples:/app/examples:ro

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      # The browser hits the frontend, which proxies /api/* to the backend.
      NEXT_PUBLIC_API_BASE: http://backend:8000
    ports:
      - "3000:3000"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
